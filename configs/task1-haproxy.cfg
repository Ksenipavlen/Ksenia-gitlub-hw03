global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 2048

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend task1_tcp_front
    bind *:8080
    mode tcp
    default_backend task1_python_servers

backend task1_python_servers
    mode tcp
    balance roundrobin
    server py1 127.0.0.1:8001
    server py2 127.0.0.1:8002
